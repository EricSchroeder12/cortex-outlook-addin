<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cortex Bridge</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      padding: 16px;
      font-size: 13px;
    }
    h1 {
      color: #e07b39;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.connected { background: #0d2a1a; color: #4caf50; border: 1px solid #1e5c32; }
    .status.disconnected { background: #2a0d0d; color: #ef5350; border: 1px solid #5c1e1e; }
    .status.syncing { background: #0d1a2a; color: #58a6ff; border: 1px solid #1e3a5c; }
    button {
      width: 100%;
      padding: 10px;
      background: #e07b39;
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover { background: #f08a4a; }
    button.secondary { background: transparent; color: #e07b39; border: 1px solid #5a3318; }
    button.secondary:hover { background: #1a1208; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .last-sync {
      color: #666;
      font-size: 11px;
      text-align: center;
    }
    .summary {
      margin-top: 12px;
      padding: 10px;
      background: #111118;
      border-radius: 6px;
      border: 1px solid #222;
      font-size: 12px;
      line-height: 1.6;
      color: #aaa;
    }
    .summary strong { color: #e07b39; }
    .summary.probe { white-space: pre-wrap; font-family: 'Consolas','Courier New',monospace; font-size: 11px; }
  </style>
</head>
<body>
  <h1>
    <svg width="20" height="20" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <linearGradient id="cortexBrain" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffb05a"/><stop offset="1" stop-color="#a83a09"/>
        </linearGradient>
      </defs>
      <g fill="url(#cortexBrain)" stroke="url(#cortexBrain)">
        <ellipse cx="50" cy="44" rx="33" ry="27"/>
        <circle cx="33" cy="28" r="12"/><circle cx="50" cy="23" r="13"/><circle cx="67" cy="28" r="12"/>
        <circle cx="23" cy="40" r="12"/><circle cx="77" cy="40" r="12"/>
        <circle cx="30" cy="55" r="11"/><circle cx="70" cy="55" r="11"/>
        <line x1="50" y1="60" x2="50" y2="84" stroke-width="15" stroke-linecap="round"/>
      </g>
      <g stroke="#5a2006" stroke-opacity="0.55" fill="none">
        <line x1="50" y1="18" x2="50" y2="62" stroke-width="3.4" stroke-linecap="round"/>
        <line x1="28" y1="33" x2="41" y2="39" stroke-width="3" stroke-linecap="round"/>
        <line x1="25" y1="46" x2="40" y2="49" stroke-width="3" stroke-linecap="round"/>
        <line x1="31" y1="56" x2="44" y2="57" stroke-width="3" stroke-linecap="round"/>
        <line x1="59" y1="39" x2="72" y2="33" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="49" x2="75" y2="46" stroke-width="3" stroke-linecap="round"/>
        <line x1="56" y1="57" x2="69" y2="56" stroke-width="3" stroke-linecap="round"/>
      </g>
    </svg>
    Cortex Bridge
  </h1>
  <div id="status" class="status disconnected">Checking Cortex...</div>
  <button id="syncBtn" onclick="sendToCortex()" disabled>Send to Cortex</button>
  <button id="probeBtn" class="secondary" onclick="runProbe()">Run capability probe</button>
  <div id="lastSync" class="last-sync"></div>
  <div id="summary" class="summary" style="display:none"></div>
  <div id="probe" class="summary probe" style="display:none"></div>
</body>
</html>
